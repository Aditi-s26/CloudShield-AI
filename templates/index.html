<!DOCTYPE html>
<html>
<head>

<title>CloudShield AI</title>

<style>

body {
    background:#050816;
    color:white;
    font-family:Arial, sans-serif;
    text-align:center;
    padding:30px;
}


.container {
    max-width:600px;
    margin:auto;
    background:#111827;
    padding:30px;
    border-radius:15px;
}


input {
    width:80%;
    padding:12px;
    margin:10px;
    border-radius:8px;
    border:none;
}


button {

    padding:12px 30px;
    background:#00ff99;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;

}


#result-area {

    margin-top:25px;

}


.normal {

    color:#00ff99;
    font-size:22px;

}


.attack {

    color:#ff3355;
    font-size:22px;

}


.log {

    margin-top:20px;
    text-align:left;
    background:#020617;
    padding:15px;
    border-radius:10px;

}


</style>

</head>


<body>


<div class="container">


<h1>CloudShield AI</h1>

<h2>Live Detection Simulator</h2>


<input id="src-ip" placeholder="Source IP">

<br>


<input id="dst-port" placeholder="Destination Port">

<br>


<input id="duration" placeholder="Duration">


<br>


<button onclick="analyzeTraffic()">
Analyze Traffic
</button>



<div id="result-area">

</div>


<div class="log">

<h3>Activity Log</h3>

<div id="logs">

</div>

</div>


</div>





<script>


function analyzeTraffic(){


const ip =
document.getElementById("src-ip").value;


const port =
document.getElementById("dst-port").value;


const duration =
document.getElementById("duration").value;



const result =
document.getElementById("result-area");



result.innerHTML =
"Analyzing traffic...";



fetch("/predict",{

method:"POST",

headers:{

"Content-Type":"application/json"

},


body:JSON.stringify({

duration:duration,

src_bytes:500,

dst_bytes:300,

source_ip:ip,

port:port

})


})


.then(response=>response.json())


.then(data=>{


let prediction=data.prediction;


let status;



if(prediction==="normal"){


status="Normal Traffic";


result.innerHTML=`

<div class="normal">

✓ NORMAL TRAFFIC

</div>

<p>

Source: ${ip}<br>

Protocol: TCP → Port ${port}<br>

Classification:
Benign network activity<br>

Duration:
${duration}

</p>


`;



}

else{


status="Attack Detected";


result.innerHTML=`

<div class="attack">

⚠ ATTACK DETECTED

</div>


<p>

Source: ${ip}<br>

Protocol: TCP → Port ${port}<br>

Classification:
${prediction}<br>

Duration:
${duration}

</p>


`;



}





// save into MongoDB


fetch("/save_log",{

method:"POST",

headers:{

"Content-Type":"application/json"

},


body:JSON.stringify({

source_ip:ip,

port:port,

protocol:"TCP",

scenario:prediction,

status:status

})


});


})



.catch(error=>{


result.innerHTML=

"Server Error";


console.log(error);


});



}





</script>



</body>

</html>
